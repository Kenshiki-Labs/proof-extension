name = "pulse-ai-audit"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Secrets (set with `wrangler secret put <NAME>`):
#   OPENROUTER_API_KEY  — the product OpenRouter key; never ships in the extension.
#
# Optional vars:
#   ALLOWED_EXTENSION_ORIGIN — pin to the published extension id, e.g.
#   "chrome-extension://abcdefghijklmnop". Unset = any chrome-extension origin.

[vars]
OPENROUTER_MODEL = "anthropic/claude-sonnet-5"

# Per-IP rate limit: 6 report generations per minute is far above real usage
# while capping abuse of the product key.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 6, period = 60 }
